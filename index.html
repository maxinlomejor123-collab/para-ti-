<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eternidad de Carne - Viviana</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #000; overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 95%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
            animation: glitch 4s infinite; cursor: crosshair;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #600; text-align: center;
        }

        .contenedor-principal {
            z-index: 10; width: 85%; max-width: 700px; max-height: 70vh;
            background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid #600;
            box-shadow: 0 0 100px #900; border-radius: 15px; 
            display: none; overflow-y: auto; text-align: center;
            scrollbar-width: thin; scrollbar-color: #600 #000;
        }

        #texto-dinamico {
            font-size: 1.4rem; font-family: 'Nosifer'; color: #b00;
            line-height: 1.8; text-shadow: 0 0 20px #000; white-space: pre-wrap;
        }

        .mensaje-final {
            font-family: 'Crimson Text', serif; font-style: italic;
            font-size: 1.9rem; color: #fff; text-shadow: 0 0 20px #f00;
            display: none; animation: fadeIn 3s;
        }

        /* BOTÓN CORAZÓN SANGRIENTO */
        #boton-finalizar {
            position: fixed; left: 20px; bottom: 50%; transform: translateY(50%);
            font-size: 3rem; cursor: pointer; z-index: 300; display: none;
            filter: drop-shadow(0 0 10px #f00); animation: latido 0.8s infinite;
            background: none; border: none;
        }
        #boton-finalizar::after {
            content: ""; position: absolute; top: 100%; left: 50%;
            width: 4px; height: 40px; background: #800; border-radius: 50%;
            animation: goteoBotón 1.5s infinite;
        }

        .info-inferior {
            position: fixed; bottom: 20px; right: 20px;
            font-family: 'Metal Mania'; color: #800; font-size: 1.3rem;
            text-shadow: 0 0 10px #f00; z-index: 50; display: none; text-align: right;
        }

        #inundacion {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%;
            background: #500; z-index: 200; transition: bottom 4s ease-in;
        }

        @keyframes latido { 0%, 100% { scale: 1; } 50% { scale: 1.2; } }
        @keyframes goteoBotón { 0% { height: 0; opacity: 1; } 100% { height: 60px; opacity: 0; } }
        @keyframes caer { to { transform: translateY(110vh); } }
        @keyframes levitar { 0% { transform: translateY(105vh); opacity: 1; } 100% { transform: translateY(-15vh); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .corazon { position: absolute; font-size: 2.5rem; z-index: 5; animation: levitar linear forwards; }
        .sangre-caida { position: absolute; background: #600; width: 3px; height: 50px; animation: caer linear forwards; z-index: 5; }
    </style>
</head>
<body>

<div id="inundacion"></div>
<button id="boton-finalizar" onclick="saltarAlFinal()">❤️</button>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 3rem;">EL BANQUETE DE VIVIANA</h1>
    <p style="font-family: 'Metal Mania'; color: #333;">(Haz clic para iniciar el sacrificio)</p>
</div>

<audio id="musica" src="Seven Tears Are Flowing to the River.mp3"></audio>

<div class="contenedor-principal" id="caja">
    <div id="texto-dinamico"></div>
    <div id="mensaje-final" class="mensaje-final"></div>
</div>

<div class="info-inferior" id="info">
    TE AMO VIVIANA<br>GRACIAS POR ESTOS 4 AÑOS
    <div id="contador" style="color: #f00; font-family: 'Nosifer'; font-size: 0.8rem;"></div>
</div>

<script>
const poemaBrutal = `No me basta tu nombre, quiero el calcio de tus huesos,
astillar tu resistencia con el filo de mis besos.
Quiero abrirte los costados, hurgar en tu anatomía,
y que mi hambre sea el mapa de tu dulce agonía.

Te amo con la rabia del que muere de ayuno,
buscando en tus entrañas un refugio oportuno.
Quiero morder tu aorta, beberme tu latido,
que tu pulso y mi lengua compartan el nido.

Eres mi hostia de carne, mi banquete de nervios,
te devoro en silencio, sin ritos soberbios.
Arrancarte los ojos para que veas por los míos,
y saciar con tu linfa mis eternos hastíos.

Que mi estómago sea tu tumba sagrada,
donde duermas por siempre, de mi ser empapada.
No es morir, es fundirse; es un amor de fiera:
que solo queda el rastro de nuestra dentellada entera.

Mastica mi alma, tritura mis anhelos,
que mi sangre pinte tus negros desvelos.
No hay paz en este amor, solo hambre infinita,
una sed de nosotros que en los huesos habita.

Al final, cuando el plato sea un hueso vacío,
sabrás que eres yo, y que ya nada es frío.
Porque amarte, mi vida, es matarte un momento,
para que seas mi sangre, mi luz y mi aliento.`;

const cartaAmor = `Viviana, lo nuestro fue lo más inesperado y hermoso que me pudo pasar. 
Desde aquellos días a los 15 años cuando todo empezó, hasta hoy, 
mi mundo no ha dejado de girar en torno a ti. 
Han pasado casi 4 años y quiero que sepas que, sin importar cuánto tiempo pase, 
jamás dejaré de verte con estos mismos ojos de amor, 
porque eres y serás siempre el latido que me mantiene vivo.`;

const audio = document.getElementById('musica');

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    document.getElementById('info').style.display = 'block';
    document.getElementById('boton-finalizar').style.display = 'block';
    audio.play();

    let i = 0;
    const t = document.getElementById("texto-dinamico");
    function type() {
        if(i < poemaBrutal.length) {
            t.innerHTML += poemaBrutal.charAt(i); i++;
            setTimeout(type, 65);
        }
    }
    type();
    setInterval(caerSangre, 50);
    setInterval(crearCorazon, 300);
    setInterval(actualizarContador, 1000);
}

function saltarAlFinal() { audio.currentTime = audio.duration - 1; }

audio.onended = function() {
    document.getElementById("texto-dinamico").style.display = "none";
    document.getElementById("boton-finalizar").style.display = "none";
    const final = document.getElementById("mensaje-final");
    final.style.display = "block";
    final.innerHTML = cartaAmor;
    setTimeout(() => { document.getElementById("inundacion").style.bottom = "0"; }, 6000);
};

function actualizarContador() {
    const fechaMeta = new Date('February 10, 2027 00:00:00').getTime();
    const ahora = new Date().getTime();
    const dif = fechaMeta - ahora;
    const d = Math.floor(dif / (1000 * 60 * 60 * 24));
    const h = Math.floor((dif % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((dif % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((dif % (1000 * 60)) / 1000);
    document.getElementById("contador").innerHTML = `Faltan: ${d}d ${h}h ${m}m ${s}s`;
}

function caerSangre() {
    const s = document.createElement("div");
    s.classList.add("sangre-caida");
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = "-50px";
    const dur = Math.random() * 1.5 + 1;
    s.style.animationDuration = dur + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), dur * 1000);
}

function crearCorazon() {
    const c = document.createElement("div");
    c.classList.add("corazon");
    c.innerHTML = Math.random() > 0.5 ? "🖤" : "❤️";
    c.style.left = Math.random() * 100 + "vw";
    const dur = Math.random() * 3 + 4;
    c.style.animationDuration = dur + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), dur * 1000);
}
</script>
</body>
</html>
