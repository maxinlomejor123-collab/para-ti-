<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>4 Años - Viviana</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #000; overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 95%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
            animation: glitch 4s infinite; cursor: crosshair;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #600; text-align: center;
        }

        /* Contenedor con Scroll Gótico */
        .contenedor-poema {
            z-index: 10; width: 85%; max-width: 700px; max-height: 70vh;
            background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid #600;
            box-shadow: 0 0 100px #900; border-radius: 15px; 
            display: none; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #600 #000;
        }

        /* Estilo del Scroll para Chrome/Safari */
        .contenedor-poema::-webkit-scrollbar { width: 8px; }
        .contenedor-poema::-webkit-scrollbar-track { background: #000; }
        .contenedor-poema::-webkit-scrollbar-thumb { background: #600; border-radius: 10px; }

        #texto-poema {
            font-size: 1.4rem; font-family: 'Nosifer'; color: #b00;
            line-height: 1.8; text-shadow: 0 0 20px #000; white-space: pre-wrap;
        }

        /* Mensaje y Contador */
        .info-inferior {
            position: fixed; bottom: 20px; right: 20px;
            font-family: 'Metal Mania'; color: #800; font-size: 1.3rem;
            text-shadow: 0 0 10px #f00; z-index: 50; display: none;
            text-align: right; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px;
        }

        #contador { color: #ff0000; font-family: 'Nosifer'; font-size: 1rem; margin-top: 5px; }

        .corazon {
            position: absolute; font-size: 2.5rem; color: #600;
            pointer-events: none; z-index: 5; animation: levitar linear forwards;
            filter: drop-shadow(0 0 15px #f00);
        }

        .sangre-caida {
            position: absolute; background: #600; width: 3px; height: 50px;
            animation: caer linear forwards; opacity: 0.9; z-index: 5;
        }

        @keyframes caer { to { transform: translateY(110vh); } }
        @keyframes levitar {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
        }
        @keyframes glitch { 0%, 100% { filter: contrast(1); } 50% { filter: contrast(1.2) brightness(0.9); } }
    </style>
</head>
<body>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 3rem;">NUESTRO PACTO</h1>
    <p style="font-family: 'Metal Mania'; color: #333;">(Haz clic, Viviana)</p>
</div>

<audio id="musica" src="Seven Tears Are Flowing to the River.mp3" loop></audio>

<div class="contenedor-poema" id="caja">
    <div id="texto-poema"></div>
</div>

<div class="info-inferior" id="info">
    TE AMO VIVIANA<br>FELIZ MES<br>GRACIAS POR ESTOS CASI 4 AÑOS
    <div id="contador">Cargando tiempo...</div>
</div>

<script>
const poema = `No me basta tu nombre, quiero el calcio de tus huesos,
astillar tu resistencia con el filo de mis besos.
Quiero abrirte los costados, hurgar en tu anatomía,
y que mi hambre sea el mapa de tu dulce agonía.

Te amo con la rabia del que muere de ayuno,
buscando en tus entrañas un refugio oportuno.
Quiero morder tu aorta, beberme tu latido,
que tu pulso y mi lengua compartan el nido.

Eres mi hostia de carne, mi banquete de nervios,
te devoro en silencio, sin ritos soberbios.
Arrancarte los ojos para que veas por los míos,
y saciar con tu linfa mis eternos hastíos.

Que mi estómago sea tu tumba sagrada,
donde duermas por siempre, de mi ser empapada.
No es morir, es fundirse; es un amor de fiera:
que solo queda el rastro de nuestra dentellada entera.

Al final, cuando el plato sea un hueso vacío,
sabrás que eres yo, y que ya nada es frío.
Porque amarte, mi vida, es matarte un momento,
para que seas mi sangre, mi luz y mi aliento.`;

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    document.getElementById('info').style.display = 'block';
    document.getElementById('musica').play();

    let i = 0;
    const t = document.getElementById("texto-poema");
    function type() {
        if(i < poema.length) {
            t.innerHTML += poema.charAt(i);
            i++;
            setTimeout(type, 65);
        }
    }
    type();
    setInterval(caerSangre, 60);
    setInterval(crearCorazon, 350);
    actualizarContador();
    setInterval(actualizarContador, 1000);
}

function actualizarContador() {
    const fechaMeta = new Date('February 10, 2027 00:00:00').getTime();
    const ahora = new Date().getTime();
    const dif = fechaMeta - ahora;

    const d = Math.floor(dif / (1000 * 60 * 60 * 24));
    const h = Math.floor((dif % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((dif % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((dif % (1000 * 60)) / 1000);

    document.getElementById("contador").innerHTML = `Faltan: ${d}d ${h}h ${m}m ${s}s para nuestro año`;
}

function caerSangre() {
    const s = document.createElement("div");
    s.classList.add("sangre-caida");
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = "-50px";
    const dur = Math.random() * 1.5 + 1;
    s.style.animationDuration = dur + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), dur * 1000);
}

function crearCorazon() {
    const c = document.createElement("div");
    c.classList.add("corazon");
    c.innerHTML = Math.random() > 0.5 ? "🖤" : "❤️";
    c.style.left = Math.random() * 100 + "vw";
    const dur = Math.random() * 3 + 4;
    c.style.animationDuration = dur + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), dur * 1000);
}
</script>
</body>
</html>
