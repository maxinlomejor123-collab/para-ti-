<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Viviana - 4 Años</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000; overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 95%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
        }

        /* EFECTO CORTINA */
        #cortina {
            position: fixed; top: 0; left: -100%; width: 100%; height: 100%;
            background: #600; z-index: 8000; transition: left 1s ease-in-out;
            box-shadow: 0 0 100px #300;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 7000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #800; text-align: center; padding: 20px;
        }

        .boton-contenedor {
            position: fixed; left: 30px; bottom: 50%; transform: translateY(50%);
            display: none; flex-direction: column; align-items: center; z-index: 1500;
        }
        
        #boton-finalizar {
            font-size: 5rem; cursor: pointer; background: none; border: none;
            color: #800; filter: drop-shadow(0 0 15px #f00);
            animation: latido 0.8s infinite;
        }

        .contenedor-principal {
            z-index: 100; width: 85%; max-width: 700px; max-height: 70vh;
            background: rgba(0,0,0,0.95); padding: 35px; border: 2px solid #600;
            box-shadow: 0 0 100px #900; border-radius: 20px; 
            display: none; text-align: center; overflow-y: auto; scrollbar-width: none;
        }

        #texto-dinamico, .nota-final {
            font-size: 1.25rem; font-family: 'Nosifer'; color: #b00;
            line-height: 1.7; text-shadow: 0 0 20px #000; white-space: pre-wrap;
        }

        .nota-final {
            display: none; font-family: 'Crimson Text', serif; font-style: italic;
            font-size: 1.9rem; color: #fff; text-shadow: 0 0 15px #f00;
        }

        #frase-ingles {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9000; display: none; font-family: 'Great Vibes', cursive; 
            font-size: 3.5rem; color: #fff; font-weight: bold;
            text-shadow: 0 0 25px #f00, 0 0 45px #000; text-align: center; width: 90%;
        }

        .info-inferior {
            position: fixed; bottom: 20px; right: 20px;
            color: #800; font-size: 1.1rem; z-index: 1500; display: none; text-align: right;
        }

        .foto-nosotros {
            position: absolute; width: 180px; height: auto; border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 5px;
            z-index: 1000; pointer-events: none; opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes aparecerYQuedar { 0% { opacity: 0; transform: scale(0.3) rotate(-15deg); } 100% { opacity: 1; transform: scale(1) rotate(var(--r)); } }
    </style>
</head>
<body>

<div id="cortina"></div>
<div id="frase-ingles"></div>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 2.2rem;">TODO ESTO ES POR TI MI AMOR</h1>
    <p style="color: #444; margin-top: 15px;">TÓCAME</p>
</div>

<div class="boton-contenedor" id="btn-container">
    <button id="boton-finalizar" onclick="animarCortina()">❤</button>
    <div style="color:#600; font-size: 0.8rem; margin-top: 5px; font-family: 'Metal Mania';">SORPRESA</div>
</div>

<audio id="musica" src="Seven Tears Are Flowing to the River.mp3" loop></audio>

<div class="contenedor-principal" id="caja">
    <div id="texto-dinamico"></div>
    <div id="nota-final" class="nota-final"></div>
</div>

<div class="info-inferior" id="info">
    TE AMO VIVIANA<br>GRACIAS POR ESTOS 4 AÑOS
</div>

<script>
const misFotos = [];
for (let n = 1; n <= 27; n++) { misFotos.push(`FOTOS/foto (${n}).jpg`); }
const fotosMezcladas = misFotos.sort(() => Math.random() - 0.5);

const cartaAmor = `Viviana, lo nuestro fue lo más inesperado y hermoso que me pudo pasar. Desde aquellos días a los 15 años cuando todo empezó, hasta hoy, mi mundo no ha dejado de girar en torno a ti. Han pasado casi 4 años y quiero que sepas que, sin importar cuánto tiempo pase, jamás dejaré de verte con estos mismos ojos de amor, porque eres y serás siempre el latido que me mantiene vivo.`;

const fraseFinalIngles = "If you swear to love me, I swear to stay";
const audio = document.getElementById('musica');

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    document.getElementById('btn-container').style.display = 'flex';
    document.getElementById('info').style.display = 'block';
    audio.play();
    typePoema();
}

function animarCortina() {
    const cortina = document.getElementById('cortina');
    cortina.style.left = '0'; // Cierra cortina
    
    setTimeout(() => {
        ritualFinal(); // Cambia contenido detrás
        cortina.style.left = '100%'; // Abre cortina hacia el otro lado
        setTimeout(() => { cortina.style.left = '-100%'; }, 1000); // Resetea posición
    }, 1000);
}

function ritualFinal() {
    audio.currentTime = 0;
    audio.play();
    document.getElementById("texto-dinamico").style.display = "none";
    document.getElementById("btn-container").style.display = "none";
    const nota = document.getElementById("nota-final");
    nota.style.display = "block";
    nota.innerHTML = cartaAmor;
    
    setTimeout(() => {
        fotosMezcladas.forEach((ruta, index) => {
            setTimeout(() => crearFoto(ruta), index * 2000);
        });

        const tiempoFinal = (fotosMezcladas.length * 2000) + 3000;
        
        setTimeout(() => {
            // DESVANECER TODO
            const elementos = document.querySelectorAll('.foto-nosotros, .contenedor-principal, .info-inferior');
            elementos.forEach(el => { el.style.opacity = "0"; });

            // MOSTRAR FRASE
            setTimeout(() => {
                const fraseDiv = document.getElementById("frase-ingles");
                fraseDiv.style.display = "block";
                escribirFraseFinal(fraseDiv, fraseFinalIngles);
            }, 3000);
        }, tiempoFinal);
    }, 15000); 
}

function escribirFraseFinal(elemento, texto) {
    let j = 0;
    function escribir() {
        if (j < texto.length) {
            elemento.innerHTML += texto.charAt(j);
            j++;
            setTimeout(escribir, 100);
        }
    }
    escribir();
}

function crearFoto(rutaArchivo) {
    const img = document.createElement("img");
    img.src = rutaArchivo + "?v=" + new Date().getTime();
    img.className = "foto-nosotros";
    img.style.left = (Math.random() * 80) + "vw";
    img.style.top = (Math.random() * 80) + "vh";
    const rot = Math.floor(Math.random() * 60) - 30;
    img.style.setProperty('--r', rot + "deg");
    img.style.animation = "aparecerYQuedar 3s forwards";
    img.onerror = function() { this.style.display = 'none'; };
    document.body.appendChild(img);
}

function typePoema() {
    const p = "No me basta tu nombre, quiero el calcio de tus huesos, astillar tu resistencia con el filo de mis besos...";
    let i = 0;
    function t() {
        if(i < p.length) {
            document.getElementById("texto-dinamico").innerHTML += p.charAt(i); i++;
            setTimeout(t, 70);
        }
    }
    t();
}
</script>
</body>
</html>
