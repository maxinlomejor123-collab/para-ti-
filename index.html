<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternamente - Viviana</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000; overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 95%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
        }

        /* CORTINAS TEATRO */
        .cortina-hoja {
            position: fixed; top: 0; width: 50.5%; height: 100%;
            z-index: 9500; transition: transform 5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 50px #000;
        }
        #hoja-izq { left: 0; transform: translateX(-105%); background: #700; border-right: 5px solid #400; }
        #hoja-der { right: 0; transform: translateX(105%); background: #700; border-left: 5px solid #400; }

        #final-izq { left: 0; transform: translateX(-105%); background: #000; border-right: 2px solid #222; z-index: 9600; }
        #final-der { right: 0; transform: translateX(105%); background: #000; border-left: 2px solid #222; z-index: 9600; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 7000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #800; text-align: center;
        }

        .boton-contenedor {
            position: fixed; left: 30px; bottom: 50%; transform: translateY(50%);
            display: none; flex-direction: column; align-items: center; z-index: 1500;
        }
        #boton-finalizar {
            font-size: 5rem; cursor: pointer; background: none; border: none;
            color: #800; filter: drop-shadow(0 0 15px #f00); animation: latido 0.8s infinite;
        }

        .contenedor-principal {
            z-index: 100; width: 85%; max-width: 700px; max-height: 80vh;
            background: rgba(0,0,0,0.95); padding: 35px; border: 2px solid #600;
            box-shadow: 0 0 100px #900; border-radius: 20px; 
            display: none; text-align: center; overflow-y: auto; scrollbar-width: none;
        }
        .contenedor-principal::-webkit-scrollbar { display: none; }

        #texto-dinamico, .nota-final {
            font-size: 1.2rem; font-family: 'Nosifer'; color: #b00;
            line-height: 1.6; text-shadow: 0 0 20px #000; white-space: pre-wrap;
        }
        .nota-final { display: none; font-family: 'Crimson Text', serif; font-style: italic; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px #f00; }

        #frase-ingles {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9900; display: none; font-family: 'Great Vibes', cursive; 
            font-size: 3.5rem; color: #fff; font-weight: bold;
            text-shadow: 0 0 25px #f00, 0 0 45px #000; text-align: center; width: 90%;
        }

        .foto-nosotros {
            position: absolute; width: 180px; height: auto; border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 5px;
            z-index: 1000; pointer-events: none; opacity: 0;
        }

        .corazon-final {
            position: fixed; bottom: -60px; font-size: 2.2rem;
            z-index: 9800; filter: drop-shadow(0 0 12px #f00);
            transition: transform 7s cubic-bezier(0.1, 0.25, 0.1, 1);
        }

        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes aparecerYQuedar { 0% { opacity: 0; transform: scale(0.3) rotate(-15deg); } 100% { opacity: 1; transform: scale(1) rotate(var(--r)); } }

        @media (max-width: 768px) {
            #texto-dinamico, .nota-final { font-size: 1rem; }
            .foto-nosotros { width: 120px; }
            #frase-ingles { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div id="hoja-izq" class="cortina-hoja"></div>
<div id="hoja-der" class="cortina-hoja"></div>
<div id="final-izq" class="cortina-hoja"></div>
<div id="final-der" class="cortina-hoja"></div>

<div id="frase-ingles"></div>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 2rem; font-family: 'Nosifer';">PARA TI MI AMOR</h1>
    <p style="color: #444; font-family: 'Metal Mania'; font-size: 1.2rem; margin-top: 15px;">TÓCAME</p>
</div>

<div class="boton-contenedor" id="btn-container">
    <button id="boton-finalizar" onclick="ritualConCortina()">❤</button>
    <div style="color:#600; font-size: 0.8rem; margin-top: 5px; font-family: 'Metal Mania';">SORPRESA</div>
</div>

<audio id="musica" src="Seven Tears Are Flowing to the River.mp3" loop></audio>

<div class="contenedor-principal" id="caja">
    <div id="texto-dinamico"></div>
    <div id="nota-final" class="nota-final"></div>
</div>

<script>
const misFotos = [];
for (let n = 1; n <= 27; n++) { misFotos.push(`FOTOS/foto (${n}).jpg`); }
const fotosMezcladas = misFotos.sort(() => Math.random() - 0.5);

const poemaCompleto = `No me basta tu nombre, quiero el calcio de tus huesos,
astillar tu resistencia con el filo de mis besos.
Quiero abrirte los costados, hurgar en tu anatomía,
y que mi hambre sea el mapa de tu dulce agonía.

Te amo con la rabia del que muere de ayuno,
buscando en tus entrañas un refugio oportuno.
Quiero morder tu aorta, beberme tu latido,
que tu pulso y mi lengua compartan el nido.

Eres mi hostia de carne, mi banquete de nervios,
te devoro en silencio, sin ritos soberbios.
Arrancarte los ojos para que veas por los míos,
y saciar con tu linfa mis eternos hastíos.

Que mi estómago sea tu tumba sagrada,
donde duermas por siempre, de mi ser empapada.
No es morir, es fundirse; es un amor de fiera:
que solo queda el rastro de nuestra dentellada entera.

Al final, cuando el plato sea un hueso vacío,
sabrás que eres yo, y que ya nada es frío.
Porque amarte, mi vida, es matarte un momento,
para que seas mi sangre, mi luz y mi aliento.`;

const cartaAmor = `Viviana, lo nuestro fue lo más inesperado y hermoso que me pudo pasar. Desde aquellos días a los 15 años cuando todo empezó, hasta hoy, mi mundo no ha dejado de girar en torno a ti. Han pasado casi 4 años y quiero que sepas que, sin importar cuánto tiempo pase, jamás dejaré de verte con estos mismos ojos de amor, porque eres y serás siempre el latido que me mantiene vivo.`;
const fraseFinalIngles = "If you swear to love me, I swear to stay";
const audio = document.getElementById('musica');

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    document.getElementById('btn-container').style.display = 'flex';
    audio.play();
    typePoema();
}

function ritualConCortina() {
    const izq = document.getElementById('hoja-izq');
    const der = document.getElementById('hoja-der');
    izq.style.transform = 'translateX(0)';
    der.style.transform = 'translateX(0)';

    setTimeout(() => {
        audio.currentTime = 0; audio.play();
        document.getElementById("texto-dinamico").style.display = "none";
        document.getElementById("btn-container").style.display = "none";
        const nota = document.getElementById("nota-final");
        nota.style.display = "block"; nota.innerHTML = cartaAmor;

        setTimeout(() => {
            izq.style.transform = 'translateX(-105%)';
            der.style.transform = 'translateX(105%)';
            iniciarSecuenciaFotos();
        }, 1000);
    }, 5000); 
}

function iniciarSecuenciaFotos() {
    setTimeout(() => {
        fotosMezcladas.forEach((ruta, index) => {
            setTimeout(() => crearFoto(ruta, index), index * 2000);
        });
        const tiempoFinalFotos = (fotosMezcladas.length * 2000) + 2000;
        setTimeout(cerrarCortinaNegra, tiempoFinalFotos);
    }, 20000); 
}

function cerrarCortinaNegra() {
    document.getElementById('final-izq').style.transform = 'translateX(0)';
    document.getElementById('final-der').style.transform = 'translateX(0)';

    setTimeout(() => {
        const fraseDiv = document.getElementById("frase-ingles");
        fraseDiv.style.display = "block";
        escribirFraseFinal(fraseDiv, fraseFinalIngles);
        // LLUVIA MASIVA DE CORAZONES (80ms entre cada uno)
        setInterval(lanzarCorazonFinal, 80);
    }, 5000);
}

function lanzarCorazonFinal() {
    const c = document.createElement("div");
    c.classList.add("corazon-final");
    c.innerHTML = Math.random() > 0.5 ? "❤️" : "🖤";
    c.style.left = (Math.random() * 100) + "vw";
    document.body.appendChild(c);
    
    // Parada aleatoria en el techo (para el efecto de apilado)
    const stopY = Math.random() * 12 + 1;
    setTimeout(() => { 
        c.style.transform = `translateY(-${100 - stopY}vh)`; 
    }, 50);
}

function escribirFraseFinal(elemento, texto) {
    let j = 0;
    function escribir() {
        if (j < texto.length) {
            elemento.innerHTML += texto.charAt(j); j++;
            setTimeout(escribir, 100);
        }
    }
    escribir();
}

function crearFoto(rutaArchivo, index) {
    const img = document.createElement("img");
    img.src = rutaArchivo + "?v=" + new Date().getTime();
    img.className = "foto-nosotros";
    img.style.left = (Math.random() * 75 + 5) + "vw";
    img.style.top = (Math.random() * 75 + 5) + "vh";
    const rot = Math.floor(Math.random() * 60) - 30;
    img.style.setProperty('--r', rot + "deg");
    img.style.animation = "aparecerYQuedar 3s forwards";
    img.onerror = function() { this.style.display = 'none'; };
    document.body.appendChild(img);
}

function typePoema() {
    let i = 0; const tDiv = document.getElementById("texto-dinamico");
    function t() {
        if(i < poemaCompleto.length) {
            tDiv.innerHTML += poemaCompleto.charAt(i); i++;
            document.getElementById('caja').scrollTop = document.getElementById('caja').scrollHeight;
            setTimeout(t, 70);
        }
    }
    t();
}
</script>
</body>
</html>
