<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Viviana</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #000; overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 95%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
            animation: glitch 4s infinite; cursor: crosshair;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #800; text-align: center;
        }

        .boton-contenedor {
            position: fixed; left: 40px; bottom: 50%; transform: translateY(50%);
            display: none; flex-direction: column; align-items: center; z-index: 1500;
        }
        
        #boton-finalizar {
            font-size: 5rem; cursor: pointer; background: none; border: none;
            color: #800; filter: drop-shadow(0 0 15px #f00);
            animation: latido 0.8s infinite; line-height: 1;
        }

        .contenedor-principal {
            z-index: 100; width: 90%; max-width: 800px; max-height: 80vh;
            background: rgba(0,0,0,0.95); padding: 30px; border: 2px solid #600;
            box-shadow: 0 0 100px #900; border-radius: 15px; 
            display: none; text-align: center; overflow-y: auto;
            scrollbar-width: none; -ms-overflow-style: none; /* Quita barra en Firefox/IE */
        }
        .contenedor-principal::-webkit-scrollbar { display: none; } /* Quita barra en Chrome/Safari */

        #texto-dinamico, .nota-final {
            font-size: 1.3rem; font-family: 'Nosifer'; color: #b00;
            line-height: 1.6; text-shadow: 0 0 20px #000; white-space: pre-wrap;
        }

        .nota-final {
            display: none; font-family: 'Crimson Text', serif; font-style: italic;
            font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px #f00;
        }

        .info-inferior {
            position: fixed; bottom: 20px; right: 20px;
            font-family: 'Metal Mania'; color: #800; font-size: 1.2rem;
            z-index: 1500; display: none; text-align: right;
        }
        #contador { color: #f00; font-family: 'Nosifer'; font-size: 0.8rem; margin-top: 5px; }

        .foto-nosotros {
            position: absolute; width: 220px; height: auto; border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.8); border-radius: 5px;
            z-index: 1000; pointer-events: none; opacity: 0;
            animation: aparecerYQuedar 3s forwards;
        }

        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes aparecerYQuedar { 0% { opacity: 0; transform: scale(0.3) rotate(-10deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
        @keyframes glitch { 0%, 100% { filter: contrast(1); } 50% { filter: contrast(1.05); } }
    </style>
</head>
<body>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 2.2rem;">TODO ESTO ES POR TI MI AMOR</h1>
    <p style="font-family: 'Metal Mania'; color: #444; font-size: 1.2rem;">TÓCAME</p>
</div>

<div class="boton-contenedor" id="btn-container">
    <button id="boton-finalizar" onclick="ritualFinal()">❤</button>
    <div style="color:#600; font-family:'Metal Mania'; margin-top:10px;">SORPRESA</div>
</div>

<audio id="musica" src="Seven Tears Are Flowing to the River.mp3" loop></audio>

<div class="contenedor-principal" id="caja">
    <div id="texto-dinamico"></div>
    <div id="nota-final" class="nota-final"></div>
</div>

<div class="info-inferior" id="info">
    TE AMO VIVIANA<br>GRACIAS POR ESTOS 4 AÑOS
    <div id="contador"></div>
</div>

<script>
// Lógica para las 27 fotos
const misFotos = [];
for (let n = 1; n <= 27; n++) {
    misFotos.push(`FOTOS/foto (${n}).jpg`);
}
const fotosMezcladas = misFotos.sort(() => Math.random() - 0.5);

const poemaBrutal = `No me basta tu nombre, quiero el calcio de tus huesos,
astillar tu resistencia con el filo de mis besos.
Quiero abrirte los costados, hurgar en tu anatomía,
y que mi hambre sea el mapa de tu dulce agonía.

Te amo con la rabia del que muere de ayuno,
buscando en tus entrañas un refugio oportuno.
Quiero morder tu aorta, beberme tu latido,
que tu pulso y mi lengua compartan el nido.

Eres mi hostia de carne, mi banquete de nervios,
te devoro en silencio, sin ritos soberbios.
Arrancarte los ojos para que veas por los míos,
y saciar con tu linfa mis eternos hastíos.

Que mi estómago sea tu tumba sagrada,
donde duermas por siempre, de mi ser empapada.
No es morir, es fundirse; es un amor de fiera:
que solo queda el rastro de nuestra dentellada entera.

Al final, cuando el plato sea un hueso vacío,
sabrás que eres yo, y que ya nada es frío.
Porque amarte, mi vida, es matarte un momento,
para que seas mi sangre, mi luz y mi aliento.`;

const cartaAmor = `Viviana, lo nuestro fue lo más inesperado y hermoso que me pudo pasar. Desde aquellos días a los 15 años cuando todo empezó, hasta hoy, mi mundo no ha dejado de girar en torno a ti. Han pasado casi 4 años y quiero que sepas que, sin importar cuánto tiempo pase, jamás dejaré de verte con estos mismos ojos de amor, porque eres y serás siempre el latido que me mantiene vivo.`;

const audio = document.getElementById('musica');

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    document.getElementById('btn-container').style.display = 'flex';
    document.getElementById('info').style.display = 'block';
    audio.play();
    type();
    setInterval(actualizarContador, 1000);
}

function ritualFinal() {
    audio.currentTime = 0;
    audio.play();
    document.getElementById("texto-dinamico").style.display = "none";
    document.getElementById("btn-container").style.display = "none";
    const nota = document.getElementById("nota-final");
    nota.style.display = "block";
    nota.innerHTML = cartaAmor;
    
    setTimeout(() => {
        fotosMezcladas.forEach((ruta, index) => {
            setTimeout(() => crearFoto(ruta), index * 700);
        });
    }, 15000); 
}

function actualizarContador() {
    const fechaMeta = new Date('February 10, 2027 00:00:00').getTime();
    const ahora = new Date().getTime();
    const dif = fechaMeta - ahora;
    const d = Math.floor(dif / (1000 * 60 * 60 * 24));
    const h = Math.floor((dif % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((dif % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((dif % (1000 * 60)) / 1000);
    document.getElementById("contador").innerHTML = `Faltan: ${d}d ${h}h ${m}m ${s}s`;
}

function crearFoto(rutaArchivo) {
    const img = document.createElement("img");
    img.src = rutaArchivo;
    img.className = "foto-nosotros";
    img.style.left = (Math.random() * 70 + 5) + "vw";
    img.style.top = (Math.random() * 70 + 5) + "vh";
    img.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
    
    // Intento de carga blindado: si falla .jpg, prueba .JPG
    img.onerror = function() {
        if (this.src.includes('.jpg')) {
            this.src = this.src.replace('.jpg', '.JPG');
        } else if (this.src.includes('.JPG')) {
            this.src = this.src.replace('.JPG', '.JPEG');
        } else {
            this.style.display = 'none';
        }
    };
    
    document.body.appendChild(img);
}

let i = 0;
function type() {
    if(i < poemaBrutal.length) {
        document.getElementById("texto-dinamico").innerHTML += poemaBrutal.charAt(i); i++;
        setTimeout(type, 70);
    }
}
</script>
</body>
</html>
