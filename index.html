<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eternamente Tuya - Viviana</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #000; overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 95%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
            animation: glitch 4s infinite; cursor: crosshair;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #800; text-align: center;
        }

        /* CORAZÓN OSCURO (BOTÓN) */
        .boton-contenedor {
            position: fixed; left: 40px; bottom: 50%; transform: translateY(50%);
            display: none; flex-direction: column; align-items: center; z-index: 500;
        }
        #boton-finalizar {
            width: 80px; height: 80px; cursor: pointer; background: none; border: none;
            filter: drop-shadow(0 0 15px #f00) brightness(0.4) sepia(1) hue-rotate(-50deg); 
            animation: latido 0.8s infinite;
        }
        .etiqueta-sorpresa {
            color: #600; font-family: 'Metal Mania'; font-size: 1rem; margin-top: 10px;
            text-shadow: 0 0 5px #000; text-align: center; width: 120px;
        }

        .contenedor-principal {
            z-index: 10; width: 85%; max-width: 700px; max-height: 70vh;
            background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid #600;
            box-shadow: 0 0 100px #900; border-radius: 15px; 
            display: none; overflow-y: auto; text-align: center;
        }

        #texto-dinamico, .nota-final {
            font-size: 1.4rem; font-family: 'Nosifer'; color: #b00;
            line-height: 1.8; text-shadow: 0 0 20px #000; white-space: pre-wrap;
        }

        .nota-final {
            display: none; font-family: 'Crimson Text', serif; font-style: italic;
            font-size: 1.9rem; color: #fff; text-shadow: 0 0 15px #f00;
        }

        /* SANGRE CHORREANDO COSTADOS */
        .sangre-costado {
            position: fixed; top: 0; width: 0; height: 100%;
            background: #600; z-index: 800; transition: width 4s ease-in;
            pointer-events: none;
        }
        #sangre-izq { left: 0; box-shadow: 10px 0 30px #200; }
        #sangre-der { right: 0; box-shadow: -10px 0 30px #200; }

        .info-inferior {
            position: fixed; bottom: 20px; right: 20px;
            font-family: 'Metal Mania'; color: #800; font-size: 1.3rem;
            z-index: 50; display: none; text-align: right;
        }

        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes caer { to { transform: translateY(110vh); } }
        @keyframes levitar { 0% { transform: translateY(105vh); opacity: 1; } 100% { transform: translateY(-15vh); opacity: 0; } }
    </style>
</head>
<body>

<div id="sangre-izq" class="sangre-costado"></div>
<div id="sangre-der" class="sangre-costado"></div>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 2.5rem;">PARA TI MI AMOR</h1>
    <p style="font-family: 'Metal Mania'; color: #444; font-size: 1.5rem;">TÓCAME</p>
</div>

<div class="boton-contenedor" id="btn-container">
    <img id="boton-finalizar" src="https://flaticon.com" onclick="ritualFinal()" alt="corazon">
    <div class="etiqueta-sorpresa">TOCA AQUÍ PARA<br>UNA SORPRESA</div>
</div>

<audio id="musica" src="Seven Tears Are Flowing to the River.mp3" loop></audio>

<div class="contenedor-principal" id="caja">
    <div id="texto-dinamico"></div>
    <div id="nota-final" class="nota-final"></div>
</div>

<div class="info-inferior" id="info">
    TE AMO VIVIANA<br>GRACIAS POR ESTOS 4 AÑOS
    <div id="contador" style="color: #f00; font-family: 'Nosifer'; font-size: 0.8rem;"></div>
</div>

<script>
const poemaBrutal = `No me basta tu nombre, quiero el calcio de tus huesos,
astillar tu resistencia con el filo de mis besos.
Quiero abrirte los costados, hurgar en tu anatomía,
y que mi hambre sea el mapa de tu dulce agonía.

Te amo con la rabia del que muere de ayuno,
buscando en tus entrañas un refugio oportuno...`;

const cartaAmor = `Viviana, lo nuestro fue lo más inesperado y hermoso que me pudo pasar. Desde aquellos días a los 15 años cuando todo empezó, hasta hoy, mi mundo no ha dejado de girar en torno a ti. Han pasado casi 4 años y quiero que sepas que, sin importar cuánto tiempo pase, jamás dejaré de verte con estos mismos ojos de amor, porque eres y serás siempre el latido que me mantiene vivo.`;

const audio = document.getElementById('musica');

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    document.getElementById('info').style.display = 'block';
    document.getElementById('btn-container').style.display = 'flex';
    audio.play();
    type();
    setInterval(caerSangre, 80);
    setInterval(crearCorazon, 500);
    setInterval(actualizarContador, 1000);
}

function ritualFinal() {
    audio.currentTime = 0;
    audio.play();
    document.getElementById("texto-dinamico").style.display = "none";
    document.getElementById("btn-container").style.display = "none";
    document.getElementById("info").style.display = "none";
    const nota = document.getElementById("nota-final");
    nota.style.display = "block";
    nota.innerHTML = cartaAmor;
    setTimeout(() => {
        document.getElementById("sangre-izq").style.width = "50%";
        document.getElementById("sangre-der").style.width = "50%";
    }, 1000);
}

function actualizarContador() {
    const fechaMeta = new Date('February 10, 2027 00:00:00').getTime();
    const ahora = new Date().getTime();
    const dif = fechaMeta - ahora;
    const d = Math.floor(dif / (1000 * 60 * 60 * 24));
    const h = Math.floor((dif % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((dif % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((dif % (1000 * 60)) / 1000);
    document.getElementById("contador").innerHTML = `Faltan: ${d}d ${h}h ${m}m ${s}s`;
}

let i = 0;
function type() {
    if(i < poemaBrutal.length) {
        document.getElementById("texto-dinamico").innerHTML += poemaBrutal.charAt(i); i++;
        setTimeout(type, 70);
    }
}

function caerSangre() {
    const s = document.createElement("div");
    s.style.position = "absolute";
    s.style.background = "#600";
    s.style.width = "2px";
    s.style.height = "40px";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = "-50px";
    s.style.animation = "caer " + (Math.random() * 2 + 1) + "s linear forwards";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 3000);
}

function crearCorazon() {
    const c = document.createElement("div");
    c.style.position = "absolute";
    c.style.color = Math.random() > 0.5 ? "#400" : "#600";
    c.style.fontSize = "2rem";
    c.innerHTML = "🖤";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animation = "levitar " + (Math.random() * 3 + 4) + "s linear forwards";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 7000);
}
</script>
</body>
</html>
