<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Devoción Visceral</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #000; overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle, transparent 0%, #000 90%), 
                              url('https://unsplash.com');
            background-size: cover; background-position: center;
            animation: glitch 5s infinite; cursor: crosshair;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'Nosifer'; color: #600; text-align: center;
        }

        .contenedor-poema {
            z-index: 10; width: 80%; max-width: 800px; text-align: center; display: none;
            background: rgba(0,0,0,0.9); padding: 50px; border: 2px solid #400;
            box-shadow: 0 0 100px #600; border-radius: 15px;
        }

        #texto-poema {
            font-size: 1.4rem; font-family: 'Nosifer'; color: #900;
            line-height: 1.8; text-shadow: 0 0 15px #000; white-space: pre-wrap;
        }

        @keyframes glitch {
            0% { filter: contrast(1) brightness(1); }
            1% { filter: contrast(1.2) brightness(0.9) sepia(0.5); }
            2% { filter: contrast(1) brightness(1); }
        }

        .sangre-caida {
            position: absolute; background: #400; width: 2px; height: 35px;
            animation: caer linear forwards; opacity: 0.7; z-index: 5;
        }

        @keyframes caer { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

<div id="overlay" onclick="iniciarRitual()">
    <h1 style="font-size: 3.5rem; margin-bottom: 10px;">CONSUMIR</h1>
    <p style="font-family: 'Metal Mania'; color: #444; letter-spacing: 2px;">(Haz clic para iniciar el sacrificio)</p>
</div>

<!-- Nombre exacto del archivo que subiste -->
<audio id="musica" src="Seven Tears Are Flowing to the River.mp3" loop></audio>

<div class="contenedor-poema" id="caja">
    <div id="texto-poema"></div>
</div>

<script>
const poema = `No me basta tu nombre, quiero el calcio de tus huesos,
astillar tu resistencia con el filo de mis besos.
Quiero abrirte los costados, hurgar en tu anatomía,
y que mi hambre sea el mapa de tu dulce agonía.

Te amo con la rabia del que muere de ayuno,
buscando en tus entrañas un refugio oportuno.
Quiero morder tu aorta, beberme tu latido,
que tu pulso y mi lengua compartan el nido.

Eres mi hostia de carne, mi banquete de nervios,
te devoro en silencio, sin ritos soberbios.
Arrancarte los ojos para que veas por los míos,
y saciar con tu linfa mis eternos hastíos.

Que mi estómago sea tu tumba sagrada,
donde duermas por siempre, de mi ser empapada.
No es morir, es fundirse; es un amor de fiera:
que solo queda el rastro de nuestra dentellada entera.

Al final, cuando el plato sea un hueso vacío,
sabrás que eres yo, y que ya nada es frío.
Porque amarte, mi vida, es matarte un momento,
para que seas mi sangre, mi luz y mi aliento.`;

function iniciarRitual() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('caja').style.display = 'block';
    
    const cancion = document.getElementById('musica');
    cancion.play();

    let i = 0;
    const t = document.getElementById("texto-poema");
    
    function type() {
        if(i < poema.length) {
            t.innerHTML += poema.charAt(i);
            i++;
            setTimeout(type, 80); // Velocidad de escritura
        }
    }
    
    type();
    setInterval(caerSangre, 120); // Lluvia de sangre
}

function caerSangre() {
    const s = document.createElement("div");
    s.classList.add("sangre-caida");
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = "-50px";
    const duracion = Math.random() * 3 + 1.5;
    s.style.animationDuration = duracion + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), duracion * 1000);
}
</script>

</body>
</html>
